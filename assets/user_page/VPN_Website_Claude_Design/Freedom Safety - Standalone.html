document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

g-1: #0A1628;\n    --bg-2: #0F1F38;\n    --ink-0: #E6F1FF;\n    --ink-1: #A8BED9;\n    --ink-2: #6B82A1;\n    --line: rgba(168, 190, 217, 0.14);\n    --line-strong: rgba(168, 190, 217, 0.28);\n    --cyan: #22D3EE;\n    --sky: #38BDF8;\n    --glow: #7DD3FC;\n    --ok: #4ADE80;\n    --warn: #FCD34D;\n    --bad: #F87171;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body {\n    background: var(--bg-0);\n    color: var(--ink-0);\n    font-family: 'Inter', system-ui, sans-serif;\n    font-size: 15px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n  body::before {\n    content: \"\";\n    position: fixed; inset: 0;\n    background:\n      radial-gradient(1200px 800px at 70% -10%, rgba(34, 211, 238, 0.12), transparent 60%),\n      radial-gradient(900px 700px at -10% 30%, rgba(56, 189, 248, 0.08), transparent 60%),\n      linear-gradient(180deg, #060B18 0%, #0A1628 50%, #060B18 100%);\n    z-index: -2;\n    pointer-events: none;\n  }\n  body::after {\n    content: \"\";\n    position: fixed; inset: 0;\n    background-image:\n      linear-gradient(rgba(168,190,217,0.04) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(168,190,217,0.04) 1px, transparent 1px);\n    background-size: 64px 64px;\n    mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);\n    z-index: -1;\n    pointer-events: none;\n  }\n  h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: -0.02em; }\n  .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.02em; }\n\n  /* ---------- NAV ---------- */\n  .nav {\n    position: sticky; top: 0; z-index: 50;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 18px 56px;\n    backdrop-filter: blur(12px);\n    background: rgba(6, 11, 24, 0.65);\n    border-bottom: 1px solid var(--line);\n  }\n  .brand { display: flex; align-items: center; gap: 12px; }\n  .brand-mark {\n    width: 38px; height: 38px; position: relative;\n    display: grid; place-items: center;\n  }\n  .brand-mark svg { width: 100%; height: 100%; overflow: visible; }\n  .brand-mark .sine-path {\n    stroke-dasharray: 60;\n    stroke-dashoffset: 60;\n    animation: sineDraw 3.4s cubic-bezier(.7,.1,.2,1) infinite;\n  }\n  .brand-mark .sine-glow {\n    filter: drop-shadow(0 0 4px var(--cyan));\n    animation: sineGlow 3.4s ease-in-out infinite;\n  }\n  .brand-mark .x-stroke {\n    stroke-dasharray: 24;\n    stroke-dashoffset: 24;\n    animation: xDraw 3.4s cubic-bezier(.7,.1,.2,1) infinite;\n  }\n  .brand-mark .x-stroke.b { animation-delay: .15s; }\n  .brand-mark .tracer {\n    animation: tracerMove 3.4s cubic-bezier(.45,.05,.55,.95) infinite;\n  }\n  @keyframes sineDraw {\n    0%   { stroke-dashoffset: 60; }\n    40%  { stroke-dashoffset: 0; }\n    80%  { stroke-dashoffset: 0; opacity: 1; }\n    100% { stroke-dashoffset: -60; opacity: 0.2; }\n  }\n  @keyframes sineGlow {\n    0%,100% { filter: drop-shadow(0 0 2px var(--cyan)); }\n    50%     { filter: drop-shadow(0 0 8px var(--cyan)); }\n  }\n  @keyframes xDraw {\n    0%   { stroke-dashoffset: 24; }\n    50%  { stroke-dashoffset: 0; }\n    100% { stroke-dashoffset: 0; }\n  }\n  @keyframes tracerMove {\n    0%   { offset-distance: 0%; opacity: 0; }\n    15%  { opacity: 1; }\n    85%  { opacity: 1; }\n    100% { offset-distance: 100%; opacity: 0; }\n  }\n  .brand-text {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 700; letter-spacing: 0.01em; font-size: 17px;\n    display: flex; align-items: baseline; gap: 6px;\n  }\n  .brand-text .sin { color: var(--ink-0); }\n  .brand-text .x {\n    color: var(--cyan);\n    font-style: italic; font-weight: 600;\n    position: relative;\n    display: inline-block;\n  }\n  .brand-text .x::after {\n    content: \"\"; position: absolute; left: -2px; right: -2px; bottom: -2px;\n    height: 1px;\n    background: linear-gradient(90deg, transparent, var(--cyan), transparent);\n    animation: underlineSweep 3.4s ease-in-out infinite;\n  }\n  @keyframes underlineSweep {\n    0%, 100% { transform: scaleX(0); opacity: 0; }\n    40%, 70% { transform: scaleX(1); opacity: 1; }\n  }\n  .brand-text .cloud {\n    color: var(--ink-1); font-weight: 500; font-size: 16px;\n  }\n  .brand-text .cn {\n    font-family: 'Space Grotesk', 'PingFang SC', 'Microsoft YaHei', sans-serif;\n    font-weight: 600;\n  }\n  .nav-links { display: flex; gap: 32px; }\n  .nav-links a {\n    color: var(--ink-1); text-decoration: none; font-size: 14px; font-weight: 500;\n    transition: color .2s;\n  }\n  .nav-links a:hover { color: var(--ink-0); }\n  .nav-cta { display: flex; gap: 10px; align-items: center; }\n  .btn {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 500; font-size: 14px;\n    padding: 9px 18px; border-radius: 8px;\n    border: 1px solid var(--line-strong);\n    background: transparent; color: var(--ink-0);\n    cursor: pointer; text-decoration: none;\n    display: inline-flex; align-items: center; gap: 8px;\n    transition: all .2s;\n  }\n  .btn:hover { border-color: var(--cyan); color: var(--cyan); }\n  .btn-primary {\n    background: linear-gradient(135deg, var(--cyan), var(--sky));\n    color: #041222; border-color: transparent;\n    box-shadow: 0 0 24px rgba(34, 211, 238, 0.25);\n  }\n  .btn-primary:hover { color: #041222; box-shadow: 0 0 32px rgba(34, 211, 238, 0.45); transform: translateY(-1px); }\n\n  /* ---------- HERO ---------- */\n  .hero {\n    position: relative;\n    min-height: 0;\n    padding: 24px 56px 48px;\n    display: grid;\n    grid-template-columns: 1.05fr 1fr;\n    gap: 60px;\n    align-items: start;\n    overflow: hidden;\n  }\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 6px 12px; border-radius: 999px;\n    border: 1px solid var(--line-strong);\n    background: rgba(34, 211, 238, 0.06);\n    font-family: 'JetBrains Mono', monospace; font-size: 11px;\n    color: var(--cyan); text-transform: uppercase; letter-spacing: 0.14em;\n  }\n  .eyebrow .dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--ok); box-shadow: 0 0 8px var(--ok);\n    animation: pulse 2s infinite;\n  }\n  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }\n  .hero h1 {\n    font-size: 72px; line-height: 1.02; margin: 24px 0 20px;\n    font-weight: 600;\n  }\n  .hero h1 .grad {\n    background: linear-gradient(120deg, #FFFFFF 0%, var(--glow) 40%, var(--cyan) 70%, var(--sky) 100%);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n    background-size: 200% 100%;\n    animation: sheen 6s ease-in-out infinite;\n  }\n  @keyframes sheen { 0%, 100% { background-position: 0% 0; } 50% { background-position: 100% 0; } }\n  .hero .lede {\n    font-size: 19px; color: var(--ink-1); max-width: 520px; line-height: 1.6;\n    margin-bottom: 36px;\n  }\n  .hero-cta { display: flex; gap: 14px; align-items: center; justify-content: center; flex-wrap: wrap; }\n  .hero-cta .btn-primary { padding: 14px 24px; font-size: 15px; }\n  .hero-cta .btn { padding: 13px 22px; font-size: 15px; }\n  .hero-stats {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    gap: 24px; padding-top: 32px;\n    border-top: 1px solid var(--line);\n    max-width: 560px;\n  }\n  .hero-stats .stat .num {\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 28px; font-weight: 600; color: var(--ink-0);\n    letter-spacing: -0.02em;\n  }\n  .hero-stats .stat .lbl { color: var(--ink-2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }\n\n  /* ---------- GLOBE ---------- */\n  .globe-col {\n    display: flex; flex-direction: column;\n    gap: 32px;\n    margin-top: 0;\n  }\n  .globe-wrap {\n    position: relative; aspect-ratio: 1; max-width: 600px;\n    margin: 0 auto;\n    width: 100%;\n  }\n  .globe-wrap::before {\n    content: \"\"; position: absolute; inset: -8%;\n    background:   aspect-ratio: 3 / 4;\n    border-radius: 6px;\n    background: linear-gradient(135deg, rgba(125, 211, 252, 0.15), rgba(34, 211, 238, 0.04));\n    border: 1px solid var(--line);\n    position: relative; overflow: hidden;\n  }\n  .anime-tile::after {\n    content: \"\"; position: absolute; inset: 0;\n    background:\n      repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 8px);\n  }\n  .anime-tile span {\n    position: absolute; bottom: 6px; left: 6px;\n    font-family: 'JetBrains Mono', monospace; font-size: 8px;\n    color: var(--ink-2); letter-spacing: 0.06em;\n  }\n\n  /* ---------- FAQ ---------- */\n  .faq {\n    max-width: 820px; margin: 0 auto;\n    display: flex; flex-direction: column; gap: 12px;\n  }\n  .faq-item {\n    border: 1px solid var(--line); border-radius: 12px;\n    background: rgba(10,22,40,0.4);\n    overflow: hidden;\n  }\n  .faq-item summary {\n    cursor: pointer; list-style: none;\n    padding: 20px 24px;\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 16px; font-weight: 500;\n    display: flex; justify-content: space-between; align-items: center;\n  }\n  .faq-item summary::after {\n    content: \"+\"; font-size: 20px; color: var(--cyan);\n    transition: transform .2s;\n  }\n  .faq-item[open] summary::after { content: \"−\"; }\n  .faq-item .body {\n    padding: 0 24px 22px; color: var(--ink-1); font-size: 14px; line-height: 1.7;\n  }\n  .faq-item .body code {\n    font-family: 'JetBrains Mono', monospace; font-size: 12px;\n    background: rgba(34,211,238,0.08); padding: 2px 6px; border-radius: 4px;\n    color: var(--glow);\n  }\n\n  /* ---------- CTA ---------- */\n  .cta-band {\n    padding: 100px 56px;\n    text-align: center;\n    position: relative;\n    overflow: hidden;\n  }\n  .cta-band::before {\n    content: \"\"; position: absolute; inset: 0;\n    background:\n      radial-gradient(ellipse at center, rgba(34,211,238,0.15), transparent 60%);\n  }\n  .cta-band .inner { position: relativ adient id=\"pgArea\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#22D3EE\" stop-opacity=\"0.35\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#22D3EE\" stop-opacity=\"0\"><\u002Fstop>\n              <\u002FlinearGradient>\n            <\u002Fdefs>\n            <line x1=\"0\" y1=\"25\" x2=\"240\" y2=\"25\" stroke=\"rgba(168,190,217,0.1)\" stroke-dasharray=\"2 4\"><\u002Fline>\n            <line x1=\"0\" y1=\"50\" x2=\"240\" y2=\"50\" stroke=\"rgba(168,190,217,0.1)\" stroke-dasharray=\"2 4\"><\u002Fline>\n            <line x1=\"0\" y1=\"75\" x2=\"240\" y2=\"75\" stroke=\"rgba(168,190,217,0.1)\" stroke-dasharray=\"2 4\"><\u002Fline>\n            <path id=\"pingArea\" fill=\"url(#pgArea)\"><\u002Fpath>\n            <path id=\"pingLine\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Anime / Streaming deep -->\n    <div class=\"uc uc-sm reveal\">\n      <div>\n        <div class=\"uc-tag\" data-i18n=\"uc5.tag\">/ 07 · ANIME<\u002Fdiv>\n        <h3 data-i18n=\"uc5.h\">JP catalogs, current-season simulcasts.<\u002Fh3>\n        <p data-i18n=\"uc5.p\">Tokyo exit nodes, residential IPs when needed.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"uc-viz\">\n        <div class=\"anime-scene\">\n          <div class=\"anime-tile\"><span>SEASON 1<\u002Fspan><\u002Fdiv>\n          <div class=\"anime-tile\"><span>EP 12<\u002Fspan><\u002Fdiv>\n          <div class=\"anime-tile\"><span>LIVE<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= NETWORK / MAP ================= -->\n<section id=\"network\">\n  <div class=\"section-head reveal\">\n    <div class=\"kicker\" data-i18n=\"nw.kicker\">/ THE NETWORK<\u002Fdiv>\n    <h2 data-i18n=\"nw.h2\">7 regions. Pick by city, by latency, or by exit type.<\u002Fh2>\n    <p data-i18n=\"nw.p\">\n<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"reveal\" style=\"max-width: 1200px; margin: 0 auto; border: 1px solid var(--line); border-radius: 16px; background: rgba(6, 11, 24, 0.4); padding: 40px; position: relative; min-height: 480px;\">\n    <!-- World map with blinking nodes -->\n    <svg id=\"worldMap\" viewBox=\"0 0 1000 500\" style=\"width: 100%; height: auto; display: block;\">\n      <defs>\n        <radialGradient id=\"resGlow\">\n          <stop offset=\"0%\" stop-color=\"#38BDF8\" stop-opacity=\"0.55\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#38BDF8\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FradialGradient>\n        <radialGradient id=\"okGlow\">\n          <stop offset=\"0%\" stop-color=\"#4ADE80\" stop-opacity=\"0.55\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#4ADE80\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FradialGradient>\n        <radialGradient id=\"warnGlow\">\n          <stop offset=\"0%\" stop-color=\"#FCD34D\" stop-opacity=\"0.55\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#FCD34D\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FradialGradient>\n      <\u002Fdefs>\n\n      <!-- Dot map of continents (generated in JS, appended here) -->\n      <g id=\"dotLand\"><\u002Fg>\n\n      <!-- Connection arcs between nodes -->\n      <g id=\"arcs\" stroke=\"rgba(34,211,238,0.22)\" stroke-width=\"0.8\" fill=\"none\"><\u002Fg>\n\n      <!-- Nodes -->\n      <g id=\"mapNodes\"><\u002Fg>\n    <\u002Fsvg>\n\n    <!-- Legend -->\n    <div style=\"display:flex; gap:24px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); flex-wrap: wrap;\">\n      <div style=\"display:flex; align-items:center; gap: 8px;\"><span style=\"width:8px; height:8px; border-radius:50%; background: var(--ok); box-shadow: 0 0 6px var(--ok);\"><\u002Fspan> ORDINARY NODE<\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap: 8px;\"><span style=\"width:8px; height:8px; border-radius:50%; background: var(--warn);\"><\u002Fspan> HIGH LOAD<\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap: 8px;\"><span style=\"width:8px; height:8px; border-radius:50%; background: var(--sky); box-shadow: 0 0 6px var(--sky);\"><\u002Fspan> RESIDENTIAL EXIT<\u002Fdiv>\n      <div style=\"margin-left:auto;\">7 POPS&nbsp;<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= POWER USER ================= -->\n<section id=\"docs\">\n  <div class=\"section-head reveal\">\n    <div class=\"kicker\" data-i18n=\"pu.kicker\">/ FOR POWER USERS<\u002Fdiv>\n    <h2 data-i18n=\"pu.h2\">The protocol details, if you want them.<\u002Fh2>\n    <p data-i18n=\"pu.p\">Most people don't care what's under the hood. If you do, here's the full list.<\u002Fp>\n  <\u002Fdiv>\n\n  <details class=\"power reveal\">\n    <summary>\n      <span class=\"lab\">\n        <span class=\"tag\" data-i18n=\"pu.tag\">Advanced<\u002Fspan>\n        <span data-i18n=\"pu.sum\">Supported protocols, transports, and routing<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fsummary>\n    <div class=\"power-body\">\n      <div class=\"power-cell\">\n        <div class=\"name\">VLESS + TLS Reality<\u002Fdiv>\n        <div class=\"desc\" data-i18n=\"pu.d1\">Handshake-indistinguishable transport. Default for restricted networks.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"power-cell\">\n        <div class=\"name\">Hysteria2<\u002Fdiv>\n        <div class=\"desc\" data-i18n=\"pu.d2\">QUIC-based, brutal-congestion, high-jitter links. Ideal for mobile.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"power-cell\">\n        <div class=\"name\">TUIC v5<\u002Fdiv>\n        <div class=\"desc\" data-i18n=\"pu.d3\">Low-latency QUIC tunnel with native UDP over 0-RTT resumption.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"power-cell\">\n        <div class=\"name\">WireGuard<\u002Fdiv>\n        <div class=\"desc\" data-i18n=\"pu.d4\">Standard tunnel. Best throughput on unrestricted links.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"power-cell\">\n        <div class=\"name\">SOCKS5 / HTTP<\u002Fdiv>\n        <div class=\"desc\" data-i18n=\"pu.d5\">For single-app routing and traditional proxy chains.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"power-cell\">\n        <div class=\"name\">sing-box config<\u002Fdiv>\n        <div class=\"desc\" data-i18n=\"pu.d7\">Exportable profiles for sing-box, Xray-core, v2rayN.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"power-cell\">\n        <div class=\"name\">Mihomo (Clash Meta) config<\u002Fdiv>\n        <div class=\"desc\" data-i18n=\"pu.d6\">Drop-in YAML for Mihomo / Clash Meta cores with rule-set sync.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"power-cell\">\n        <div class=\"name\">Xray config<\u002Fdiv>\n        <div class=\"desc\" data-i18n=\"pu.d8\">Native Xray JSON for Xray-core, v2rayN, v2rayNG, NekoBox.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdetails>\n<\u002Fsection>\n\n<!-- ================= FAQ ================= -->\n<section>\n  <div class=\"section-head reveal\">\n    <div class=\"kicker\" data-i18n=\"fq.kicker\">/ QUESTIONS<\u002Fdiv>\n    <h2 data-i18n=\"fq.h2\">The ones people actually ask.<\u002Fh2>\n  <\u002Fdiv>\n\n  <div class=\"faq\">\n    <details class=\"faq-item reveal\">\n      <summary data-i18n=\"q1.s\">How is this different from the service I already pay for?<\u002Fsummary>\n      <div class=\"body\" data-i18n=\"q1.b\">Most VPN providers are staunchly pro-China, actively cooperating with the CCP's censorship, regularly reporting user access data to internet monitoring departments, setting up firewalls for certain news and pornographic websites, and proactively reporting users who publish political opinions or visit Falun Gong websites. We guarantee we will not set up any firewalls or censor user online activities, as mentioned in our handling logs. Furthermore, most of our competitors are transit providers; their exit IPs may not be the node's IPs, potentially leading to incompatibility with mainstream AI models. Also, with tens of thousands of users simultaneously using the same IP, the IP quality is poor. We provide high-purity data center IPs and residential proxies.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"faq-item reveal\">\n      <summary data-i18n=\"q2.s\">Will it work on a restricted network?<\u002Fsummary>\n      <div class=\"body\" data-i18n-html=\"q2.b\">Yes. The client auto-selects a handshake-indistinguishable transport when it detects DPI interference, and falls back through a few more until something connects. If you're on the ground and nothing works, email <code>help@sinxcloud.io<\u002Fcode> — we've debugged most of them.<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"faq-item reveal\">\n      <summary data-i18n=\"q4.s\">Do you keep any logs at all?<\u002Fsummary>\n      <div class=\"body\" data-i18n=\"q4.b\">We keep aggregate bandwidth counters per account (so we can bill you) and a 10-minute rolling connection count per region (for autoscaling). No source IP, no destination, no timestamps per request.&nbsp;<\u002Fdiv>\n    <\u002Fdetails>\n    <details class=\"faq-item reveal\">\n      <summary data-i18n=\"q5.s\">What about the client — is it safe to install?<\u002Fsummary>\n      <div class=\"body\" data-i18n-html=\"q5.b\">The clients for macOS, Windows, iOS, Android, and Linux are all open source, reproducibly built, and hash-verified against GitHub releases. If you'd rather bring your own client, we support <code>sing-box<\u002Fcode>, <code>Mihomo (Clash Meta)<\u002Fcode>, <code>Xray-core<\u002Fcode>, <code>v2rayN<\u002Fcode> and WireGuard profiles out of the box.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= CTA ================= -->\n<section class=\"cta-band\">\n  <div class=\"inner reveal\ bute('data-i18n');\n    if (dict[k] != null) el.textContent = dict[k];\n  });\n  document.querySelectorAll('[data-i18n-html]').forEach(el => {\n    const k = el.getAttribute('data-i18n-html');\n    if (dict[k] != null) el.innerHTML = dict[k];\n  });\n  try { localStorage.setItem('sinx-lang', lang); } catch(e){}\n}\n\napplyLang('en');\n\n// ============== HERO CTA → SIGN IN ==============\n(() => {\n  const cta = document.getElementById('heroGetStarted');\n  const signin = document.getElementById('signinLink');\n  if (cta && signin) {\n    cta.addEventListener('click', (e) => {\n      e.preventDefault();\n      signin.click();\n    });\n  }\n})();\n\n// ============== SCROLL REVEAL ==============\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n}, { threshold: 0.12 });\ndocument.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n// ============== TICKER ==============\nconst cities = [\n  ['Tokyo','JP'],['Osaka','JP'],['Singapore','SG'],\n  ['Taipei','TW'],['Los Angeles','US'],['New York','US'],['Frankfurt','DE'],\n];\nconst ticker = document.getElementById('tickerTrack');\nconst tickerHTML = cities.map(([c,cc]) => `<div class=\"ticker-item\"><span class=\"dot\"><\u002Fspan><span class=\"loc\">${c} · ${cc}<\u002Fspan><span class=\"lat\">ONLINE<\u002Fspan><\u002Fdiv>`).join('');\nticker.innerHTML = tickerHTML + tickerHTML;\n\n// ============== LIVE PING GRAPH ==============\nconst pingLine = document.getElementById('pingLine');\nconst pingArea = document.getElementById('pingArea');\nconst pingNum = document.getElementById('pingNum');\nlet pingData = Array.from({length: 40}, () => 15 + Math.random() * 8);\nfunction renderPing() {\n  const pts = pingData.map((v, i) => [i * (240 / 39), 100 - (v * 1.5)]);\n  const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');\n  const area = d + ` L240 100 L0 100 Z`;\n  pingLine.setAttribute('d', d);\n  pingArea.setAttribute('d', area);\n  pingNum.textContent = Math.round(pingData[pingData.length - 1]);\n}\nrenderPing();\nsetInterval(() => {\n  pingData.shift();\n  pingData.push(13 + Math.random() * 9 + (Math.random() < 0.08 ? Math.random() * 6 : 0));\n  renderPing();\n}, 500);\n\n// ============== WORLD MAP ==============\n// Equirectangular projection: lng [-180..180] -> x [0..1000], lat [85..-60] -> y [0..500]\nconst MAP_W = 1000, MAP_H = 500;\nconst LAT_TOP = 72, LAT_BOT = -56; // visible lat band\nfunction proj(lng, lat) {\n  const x = ((lng + 180) / 360) * MAP_W;\n  const y = ((LAT_TOP - lat) / (LAT_TOP - LAT_BOT)) * MAP_H;\n  return [x, y];\n}\n\n// Simplified continent polygons (lng, lat) — hand-simplified outlines\nconst LAND = [\n  // North America (mainland)\n  [[-168,66],[-158,70],[-140,70],[-125,60],[-130,54],[-124,48],[-124,40],[-117,32],[-110,24],[-97,18],[-87,21],[-82,23],[-80,26],[-81,30],[-76,35],[-74,40],[-65,44],[-60,48],[-55,52],[-65,58],[-78,63],[-90,68],[-105,69],[-125,70],[-155,72]],\n  // Greenland\n  [[-55,60],[-40,60],[-20,70],[-20,80],[-55,83],[-70,78],[-60,70]],\n  // Central America\n  [[-95,16],[-90,14],[-85,11],[-79,9],[-77,8]],\n  // South America\n  [[-81,12],[-74,11],[-62,10],[-52,5],[-48,0],[-44,-5],[-40,-10],[-38,-16],[-40,-22],[-48,-28],[-58,-34],[-65,-40],[-70,-50],[-72,-54],[-70,-52],[-68,-45],[-72,-40],[-73,-30],[-72,-20],[-78,-10],[-81,-4],[-80,2],[-78,8]],\n  // Europe (Iberia → Scandinavia → West Russia)\n  [[-10,36],[-6,36],[0,38],[8,42],[12,45],[14,40],[18,40],[24,40],[28,41],[27,45],[30,45],[33,47],[40,48],[50,50],[55,58],[60,65],[50,68],[40,68],[28,70],[22,70],[15,68],[10,63],[8,58],[2,50],[-5,50],[-8,44],[-10,40]],\n  // UK/Ireland\n  [[-10,51],[-8,55],[-5,58],[-3,58],[-1,54],[0,52],[-5,50]],\n  // Africa\n  [[-17,14],[-10,20],[0,28],[10,32],[20,32],[30,31],[35,32],[40,15],[44,12],[51,12],[51,5],[42,-1],[40,-10],[39,-17],[35,-24],[28,-33],[20,-35],[15,-33],[12,-20],[10,-5],[8,4],[0,5],[-8,4],[-15,10]],\n  // Arabia / Middle East\n  [[35,33],[40,37],[48,38],[55,27],[58,22],[52,17],[45,15],[38,20]],\n  // Asia mainland (huge)\n  [[30,45],[40,45],[50,40],[60,40],[70,40],[75,37],[78,32],[88,28],[95,28],[100,22],[107,18],[110,21],[113,22],[117,23],[121,25],[122,30],[121,38],[125,40],[128,42],[133,45],[138,46],[142,50],[145,55],[150,60],[155,65],[160,68],[170,68],[178,65],[180,66],[180,70],[140,75],[100,78],[70,76],[55,72],[40,68]],\n  // India\n  [[68,24],[72,21],[73,16],[77,8],[80,8],[82,11],[87,18],[89,22],[85,26],[78,28],[72,25]],\n  // SE Asia peninsula (Indochina, Malay)\n  [[95,20],[98,16],[100,12],[102,9],[104,5],[104,1],[102,1],[100,4],[98,8],[94,17]],\n  // Japan (3 islands approximated)\n  [[130,31],[132,34],[135,34],[138,36],[141,38],[142,42],[144,44],[140,45],[136,37],[132,33]],\n  // Korean peninsula\n  [[125,34],[127,34],[129,36],[129,40],[126,40],[125,38]],\n  // Philippines (simplified blob)\n  [[118,18],[122,18],[126,12],[126,6],[122,6],[118,10]],\n  // Indonesia - Sumatra\n  [[95,5],[100,5],[106,-2],[104,-6],[100,-5],[95,0]],\n  // Java\n  [[106,-6],[114,-7],[114,-9],[106,-8]],\n  // Borneo\n  [[109,4],[118,4],[119,-2],[112,-4],[108,-1]],\n  // Sulawesi / PNG approximated\n  [[120,1],[124,1],[125,-5],[121,-5],[119,-2]],\n  [[132,-3],[145,-3],[150,-8],[140,-10],[132,-8]],\n  // Australia\n  [[113,-22],[115,-34],[122,-34],[130,-32],[137,-35],[141,-38],[146,-39],[150,-37],[153,-28],[146,-19],[139,-17],[135,-15],[130,-12],[125,-14],[120,-18]],\n  // New Zealand (two islands merged)\n  [[170,-35],[176,-39],[178,-42],[172,-46],[167,-45],[166,-42]],\n];\n\n// Rasterise continents as a grid of dots inside the polygons.\nfunction pointInPoly(px, py, poly) {\n  let inside = false;\n  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {\n    const [xi, yi] = poly[i], [xj, yj] = poly[j];\n    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;\n  }\n  return inside;\n}\n\n(function renderDotLand() {\n  const g = document.getElementById('dotLand');\n  const STEP = 6;                    // dot grid step in viewBox px\n  const dotR = 0.9;\n  const projectedPolys = LAND.map(p => p.map(([lng, lat]) => proj(lng, lat)));\n  const frag = [];\n  for (let y = 0; y < MAP_H; y += STEP) {\n    for (let x = 0; x < MAP_W; x += STEP) {\n      // jitter slightly for organic feel\n      const jx = x + (Math.sin(x*0.7+y) * 0.6);\n      const jy = y + (Math.cos(y*0.9+x) * 0.6);\n      for (const poly of projectedPolys) {\n        if (pointInPoly(jx, jy, poly)) {\n          frag.push(`<circle cx=\"${jx.toFixed(1)}\" cy=\"${jy.toFixed(1)}\" r=\"${dotR}\" fill=\"rgba(168,190,217,0.22)\"/>`);\n          break;\n        }\n      }\n    }\n  }\n  g.innerHTML = frag.join('');\n})();\n\n// ============== MAP NODES ==============\n// state: 'res' = residential exit, 'warn' = high load, 'ok' = ordinary node\nconst POPS = [\n  { id:'US', city:'San Francisco', lng:-122.4, lat: 37.8, state:'res',  labelAnchor:'end',   dx:-14, dy:4 },\n  { id:'US', city:'New York',      lng: -74.0, lat: 40.7, state:'ok',  labelAnchor:'start', dx: 12, dy:4 },\n  { id:'UK', city:'London',        lng: -0.1, lat: 51.5, state:'ok',   labelAnchor:'end',   dx:-14, dy:-6 },\n  { id:'DE', city:'Frankfurt',     lng:  8.7, lat: 50.1, state:'ok',   labelAnchor:'start', dx: 12, dy:4 },\n  { id:'SG', city:'Singapore',     lng:103.8, lat:  1.3, state:'res',  labelAnchor:'start', dx: 12, dy:4 },\n  { id:'TW', city:'Taipei',        lng:121.6, lat: 25.0, state:'ok',   labelAnchor:'start', dx: 12, dy: 14 },\n  { id:'KR', city:'Seoul',         lng:127.0, lat: 37.6, state:'warn', labelAnchor:'end',   dx:-14, dy:-6 },\n  { id:'JP', city:'Tokyo',         lng:139.7, lat: 35.7, state:'warn', labelAnchor:'start', dx: 12, dy:4 },\n];\n\nconst colorMap = { ok: '#4ADE80', warn: '#FCD34D', res: '#38BDF8' };\nconst glowMap  = { ok: 'url(#okGlow)', warn: 'url(#warnGlow)', res: 'url(#resGlow)' };\nconst labelMap = { ok: 'ORDINARY', warn: 'HIGH LOAD', res: 'RESIDENTIAL' };\n\n// Project\nPOPS.forEach(p => { [p.x, p.y] = proj(p.lng, p.lat); });\n\n// Draw arcs between every pair\n(function renderArcs() {\n  const g = document.getElementById('arcs');\n  const frag = [];\n  for (let i = 0; i < POPS.length; i++) {\n    for (let j = i + 1; j < POPS.length; j++) {\n      const a = POPS[i], b = POPS[j];\n      const mx = (a.x + b.x) / 2;\n      const my = (a.y + b.y) / 2 - Math.hypot(a.x-b.x, a.y-b.y) * 0.18;\n      const dashLen = Math.hypot(a.x-b.x, a.y-b.y) * 1.2;\n      frag.push(`<path d=\"M${a.x} ${a.y} Q${mx} ${my} ${b.x} ${b.y}\" stroke-dasharray=\"2 4\" opacity=\"0.35\"/>`);\n    }\n  }\n  g.innerHTML = frag.join('');\n})();\n\n// Draw nodes with labels\n(function renderNodes() {\n  const g = document.getElementById('mapNodes');\n  const frag = POPS.map((p, i) => {\n    const c = colorMap[p.state];\n    const glow = glowMap[p.state];\n    const tag = labelMap[p.state];\n    const tagColor = p.state === 'res' ? '#38BDF8' : p.state === 'warn' ? '#FCD34D' : '#4ADE80';\n    const anchor = p.labelAnchor;\n    const lx = p.x + p.dx;\n    const ly = p.y + p.dy;\n    const delay = (i * 0.35).toFixed(2);\n    return `\n      <g class=\"map-pop\" data-state=\"${p.state}\">\n        <circle cx=\"${p.x}\" cy=\"${p.y}\" r=\"26\" fill=\"${glow}\">\n          <animate attributeName=\"r\" values=\"18;34;18\" dur=\"2.6s\" begin=\"${delay}s\" repeatCount=\"indefinite\"/>\n          <animate attributeName=\"opacity\" values=\"0.8;0.1;0.8\" dur=\"2.6s\" begin=\"${delay}s\" repeatCount=\"indefinite\"/>\n        <\u002Fcircle>\n        <circle cx=\"${p.x}\" cy=\"${p.y}\" r=\"4.5\" fill=\"${c}\" stroke=\"#06101f\" stroke-width=\"1.2\"/>\n        <g transform=\"translate(${lx} ${ly})\" font-family=\"JetBrains Mono, monospace\" text-anchor=\"${anchor}\">\n          <text x=\"0\" y=\"0\" fill=\"#E6F1FF\" font-size=\"12\" font-weight=\"600\" letter-spacing=\"0.5\">${p.id} · ${p.city}<\u002Ftext>\n          <text x=\"0\" y=\"13\" fill=\"${tagColor}\" font-size=\"8.5\" letter-spacing=\"1.2\">${tag}<\u002Ftext>\n        <\u002Fg>\n      <\u002Fg>\n    `;\n  }).join('');\n  g.innerHTML = frag;\n})();\n\n// ============== FOOTER CLOCK ==============\nfunction tickClock() {\n  const now = new Date();\n  const iso = now.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';\n  document.getElementById('footerClock').textContent = `SYSTEM TIME ${iso}`;\n}\ntickClock(); setInterval(tickClock, 1000);\n\n// ============== TWEAKS REMOVED ==============\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
