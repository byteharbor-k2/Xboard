<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Free Access Logo V1 Animated</title>
  <desc id="desc">An open globe with a flowing route, pulsing network nodes, and a moving signal tracer.</desc>
  <defs>
    <linearGradient id="ringGradient" x1="120" y1="408" x2="404" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"></stop>
      <stop offset="0.52" stop-color="#1E3A8A"></stop>
      <stop offset="1" stop-color="#22D3EE"></stop>
    </linearGradient>
    <linearGradient id="routeGradient" x1="128" y1="344" x2="408" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"></stop>
      <stop offset="0.55" stop-color="#38BDF8"></stop>
      <stop offset="1" stop-color="#0F172A"></stop>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(12)">
      <stop stop-color="#67E8F9"></stop>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"></stop>
    </radialGradient>
    <clipPath id="globeClip">
