  <use href="#signalPath" stroke="url(#routeGradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"></use>
  <use href="#signalPath" stroke="#D8F8FF" stroke-width="7" stroke-linecap="round" stroke-dasharray="34 260">
    
