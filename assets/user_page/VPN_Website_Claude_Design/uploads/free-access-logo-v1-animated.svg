    <ellipse cx="256" cy="256" rx="138" ry="56" stroke="#0F172A" stroke-opacity="0.22" stroke-width="12"></ellipse>
    <ellipse cx="256" cy="204" rx="112" ry="34" stroke="#0F172A" stroke-opacity="0.18" stroke-width="10"></ellipse>
    <ellipse cx="256" cy="308" rx="112" ry="34" stroke="#0F172A" stroke-opacity="0.18" stroke-width="10"></ellipse>
    <path d="M214 122C169 166 144 208 144 256C144 304 169 346 214 390" stroke="#0F172A" stroke-opacity="0.2" stroke-width="10" stroke-linecap="round"></path>
    <path d="M256 114C235 158 224 206 224 256C224 306 235 354 256 398" stroke="#0F172A" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"></path>
